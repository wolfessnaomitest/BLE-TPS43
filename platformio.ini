;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_nrf52840]
platform = nordicnrf52
board = adafruit_feather_nrf52840
board_build.variant = nice_nano
framework = arduino

; NiceNano V2 specific board build settings
board_build.mcu = cortex-m4
board_build.f_cpu = 64000000L
board_build.core = nRF5
board_build.usb_manufacturer = "nice!"
board_build.usb_product = "Nice!Nano V2"
board_build.extra_flags = -DNRF52840_XXAA
board_build.ldscript = nrf52840_s140_v6.ld
board_build.uf2_family = 0xADA52840

; USB VID/PID for bootloader and build
board_build.vid = 0x239A
board_build.pid = 0x8029

; Memory configuration (nRF52840 with custom layout)
board_upload.maximum_size = 815104
board_upload.maximum_data_size = 237568

; Library dependencies
lib_deps = 
;    adafruit/Adafruit TinyUSB Library
;    adafruit/Adafruit nRFCrypto
    adafruit/Adafruit nRFCrypto@^0.1.2

; Build options
build_flags = 
    -D DEBUG_LEVEL=0
    -D ARDUINO_ARCH_NRF52840
    -I".pio/libdeps/adafruit_feather_nrf52840/Adafruit nRFCrypto/src"
    -L".pio/libdeps/adafruit_feather_nrf52840/Adafruit nRFCrypto/src/cortex-m4/fpv4-sp-d16-hard"

; Upload options
upload_protocol = nrfutil
upload_use_1200bps_touch = true
upload_wait_for_upload_port = true

; NOTE: NiceNano V2 configuration from https://github.com/selimmeric/Adafruit_nRF52_Arduino_Nice-NanoV2
; Includes custom pin mappings (nice_nano variant) and optimized bootloader settings
